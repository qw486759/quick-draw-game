<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Draw — Lobby</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/room-game.css" />
  <link rel="stylesheet" href="css/lobby.css" />
</head>
<body>

<header class="page-header">
  <a href="index.html" class="logo">Quick<span>Draw</span></a>
  <a href="index.html" class="back-link">← Back</a>
</header>

<main class="main">

  <!-- ── Left column: identity + create room ─────────────────── -->
  <aside class="identity-panel">

    <div class="card">
      <div class="card-header"><span class="dot"></span>Your Identity</div>
      <div class="card-body">
        <div class="identity-display">
          <div class="avatar" id="avatar">🎨</div>
          <div>
            <div class="player-label">Playing as</div>
            <div class="player-name-display empty" id="name-display">Not set</div>
          </div>
        </div>
        <div class="form-row">
          <label for="player-name">Your name</label>
          <input type="text" id="player-name" placeholder="Enter your name…"
                 maxlength="20" autocomplete="off" />
        </div>
        <button class="btn btn-secondary" id="save-name-btn">Save Name</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="dot"></span>Create Room</div>
      <div class="card-body">
        <div class="form-row">
          <label for="room-name-input">Room name</label>
          <input type="text" id="room-name-input" placeholder="My awesome room"
                 maxlength="30" autocomplete="off" />
        </div>
        <div class="form-row">
          <label for="max-players-input">Max players</label>
          <select id="max-players-input">
            <option value="2">2 players</option>
            <option value="3">3 players</option>
            <option value="4" selected>4 players</option>
            <option value="5">5 players</option>
            <option value="6">6 players</option>
          </select>
        </div>
        <button class="btn btn-primary" id="create-room-btn">Create &amp; Join →</button>
      </div>
    </div>

  </aside>

  <!-- ── Middle column: open rooms ───────────────────────────── -->
  <section>
    <div class="rooms-header">
      <h1 class="rooms-title">Open Rooms</h1>
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>
    <div id="room-list">
      <div class="empty-state">
        <div class="big">🎲</div>
        <p>Loading rooms…</p>
      </div>
    </div>
  </section>

  <!-- ── Right column: leaderboard ───────────────────────────── -->
  <aside class="leaderboard-col">
    <div class="card">
      <div class="card-header"><span class="dot"></span>Top Scores</div>
      <div class="card-body" style="padding: 16px 20px;">
        <div class="lb-list" id="lb-list">
          <div class="lb-empty">No scores yet.<br/>Play a game to get on the board!</div>
        </div>
        <div class="lb-footer">Resets when server restarts</div>
      </div>
    </div>
  </aside>

</main>

<div id="toast"></div>

<script src="js/config.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="js/socket-client.js"></script>
<script src="js/lobby.js"></script>

</body>
</html>
